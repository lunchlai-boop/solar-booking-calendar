<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Studio｜場地預約查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --solar-orange: #C84B1A;
    --solar-orange-dark: #A33D14;
    --solar-orange-light: #E8673A;
    --solar-orange-bg: #FDF0EB;
    --solar-orange-border: #F5C4B0;
    --bg: #F9F8F7;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --text: #1A1614;
    --muted: #7A726C;
    --small: #2563EB;
    --small-bg: #EFF6FF;
    --small-border: #BFDBFE;
    --full: #059669;
    --full-bg: #ECFDF5;
    --full-border: #A7F3D0;
    --today-ring: #C84B1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--solar-orange);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(200,75,26,0.4);
  }
  .logo-img { height: 40px; object-fit: contain; mix-blend-mode: screen; filter: brightness(2); }
  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .line-btn {
    display: flex; align-items: center; gap: 8px;
    background: #06C755;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .line-btn:hover { background: #05a847; }
  .line-icon { font-size: 16px; }
  .status-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.85); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.ok { background: #22C55E; animation: pulse 2s infinite; }
  .status-dot.loading { background: #F59E0B; animation: pulse 0.7s infinite; }
  .status-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Hero Strip ── */
  .hero-strip {
    background: var(--solar-orange);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hero-address {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.9);
    font-size: 13px;
  }
  .hero-address svg { flex-shrink: 0; }
  .hero-hint {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    font-style: italic;
  }

  /* ── Main ── */
  .main { max-width: 1140px; margin: 0 auto; padding: 28px 24px; }

  /* ── Legend ── */
  .legend-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
  .legend-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.4px; margin-right: 2px; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600; border: 1.5px solid;
    cursor: pointer; transition: all 0.15s; user-select: none;
    letter-spacing: 0.3px;
  }
  .chip.large  { background: var(--solar-orange-bg); border-color: var(--solar-orange-border); color: var(--solar-orange); }
  .chip.small  { background: var(--small-bg);  border-color: var(--small-border);  color: var(--small);  }
  .chip.full   { background: var(--full-bg);   border-color: var(--full-border);   color: var(--full);   }
  .chip.inactive { opacity: 0.3; }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip.large .chip-dot { background: var(--solar-orange); }
  .chip.small .chip-dot { background: var(--small); }
  .chip.full  .chip-dot { background: var(--full);  }

  /* ── Cal Nav ── */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-title { font-family: 'Barlow', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .cal-subtitle { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; letter-spacing: 0.5px; }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    width: 36px; height: 36px; border: 1.5px solid var(--border);
    background: var(--surface); border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--muted); transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--solar-orange); color: var(--solar-orange); }
  .today-btn {
    padding: 0 14px; height: 36px; border: 1.5px solid var(--border);
    background: var(--surface); border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
  }
  .today-btn:hover { border-color: var(--solar-orange); color: var(--solar-orange); }

  /* ── Calendar ── */
  .calendar { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #1A1614; }
  .cal-header-cell {
    padding: 11px 0; text-align: center; font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase;
    font-family: 'Barlow', sans-serif;
  }
  .cal-header-cell:first-child { color: #FF7A5A; }
  .cal-header-cell:last-child  { color: #6BA3FF; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell {
    min-height: 108px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 8px; cursor: pointer; transition: background 0.1s;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: #FDF4F1; }
  .cal-cell.other-month { background: #FAFAF9; }
  .cal-cell.other-month .day-num { color: #CCC8C4; }
  .cal-cell.today .day-num {
    background: var(--solar-orange); color: #FFF;
    border-radius: 50%; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-cell.sunday .day-num  { color: #EF4444; }
  .cal-cell.saturday .day-num { color: #3B82F6; }
  .cal-cell.selected { background: #FDF0EB !important; }
  .day-num {
    font-size: 13px; font-weight: 700; line-height: 1;
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    font-family: 'Barlow', sans-serif;
  }
  .booking-pill {
    display: flex; align-items: center; gap: 4px; padding: 3px 7px;
    border-radius: 4px; font-size: 11px; font-weight: 500; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pill-large { background: var(--solar-orange-bg); color: var(--solar-orange); border-left: 3px solid var(--solar-orange); }
  .pill-small { background: var(--small-bg); color: var(--small); border-left: 3px solid var(--small); }
  .pill-full  { background: var(--full-bg);  color: var(--full);  border-left: 3px solid var(--full);  }
  .pill-hidden { background: #F3F4F6; color: #6B7280; border-left: 3px solid #D1D5DB; }
  .pill-reserved { background: #FFF7ED; color: #C2410C; border-left: 3px solid #FB923C; font-style: italic; }

  /* ── Layout ── */
  .layout { display: flex; gap: 20px; align-items: flex-start; }
  .cal-wrap { flex: 1; position: relative; }
  .side-panel {
    width: 276px; flex-shrink: 0; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06); position: sticky; top: 88px;
  }
  .side-title {
    padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
    font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--text); display: flex; align-items: center; gap: 8px;
    background: #FAFAF9;
  }
  .side-date-label { font-size: 11px; font-weight: 400; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; margin-top: 2px; }
  .side-body { padding: 14px 18px; }
  .side-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; line-height: 1.8; }
  .side-empty-icon { font-size: 28px; margin-bottom: 8px; }
  .detail-card {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .detail-card:hover { border-color: var(--solar-orange-border); }
  .detail-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .detail-tag.large { background: var(--solar-orange-bg); color: var(--solar-orange); }
  .detail-tag.small { background: var(--small-bg); color: var(--small); }
  .detail-tag.full  { background: var(--full-bg);  color: var(--full);  }
  .detail-time { font-size: 20px; font-weight: 800; color: var(--text); font-family: 'Barlow', sans-serif; margin-bottom: 4px; }
  .detail-name { font-size: 12px; color: var(--muted); }

  /* ── Side CTA ── */
  .side-cta {
    margin: 4px 18px 16px;
    background: var(--solar-orange);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .side-cta-text { font-size: 12px; color: rgba(255,255,255,0.85); margin-bottom: 10px; line-height: 1.6; }
  .side-cta-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: #fff; color: #1A1614;
    padding: 8px 18px; border-radius: 6px;
    font-size: 13px; font-weight: 700;
    text-decoration: none; transition: opacity 0.15s;
    font-family: 'Barlow', sans-serif; letter-spacing: 0.3px;
  }
  .side-cta-btn:hover { opacity: 0.9; }

  /* ── Loading overlay ── */
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,0.75);
    display: flex; align-items: center; justify-content: center;
    border-radius: 16px; font-size: 13px; color: var(--muted);
    pointer-events: none; z-index: 10;
  }

  /* ── Footer ── */
  /* ── Notice Bar ── */
  .notice-bar {
    background: #FFF8E1;
    border: 1.5px solid #F5C842;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12.5px;
    color: #7A5C00;
    font-weight: 500;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  /* ── Side Note ── */
  .side-note {
    margin: 0 18px 12px;
    padding: 10px 12px;
    background: #FFF8E1;
    border-radius: 8px;
    font-size: 11px;
    color: #7A5C00;
    line-height: 1.6;
    border: 1px solid #F5C842;
  }

  /* ── Date Search Bar ── */
  .date-search-bar {
    margin-top: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .date-search-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .date-search-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .date-search-input {
    flex: 1;
    height: 40px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
    outline: none;
  }
  .date-search-input:focus {
    border-color: var(--solar-orange);
  }
  .date-search-btn {
    height: 40px;
    padding: 0 20px;
    background: var(--solar-orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .date-search-btn:hover { background: var(--solar-orange-dark); }

  footer {
    background: var(--solar-orange-dark);
    color: rgba(255,255,255,0.6);
    text-align: center;
    padding: 20px 32px;
    font-size: 12px;
    line-height: 1.8;
    margin-top: 40px;
  }
  footer a { color: var(--solar-orange-light); text-decoration: none; }
  footer strong { color: rgba(255,255,255,0.85); }

  @media (max-width: 768px) {
    header { padding: 0 16px; }
    .hero-strip { padding: 10px 16px; flex-direction: column; gap: 4px; }
    .hero-hint { display: none; }
    .main { padding: 8px; }
    .layout { flex-direction: column; }
    .side-panel { width: 100%; position: static; }
    .line-btn span { display: none; }
    .cal-title { font-size: 20px; }
    .cal-subtitle { font-size: 11px; }
    .cal-cell { min-height: 60px; padding: 4px 3px; }
    .day-num { font-size: 11px; width: 20px; height: 20px; margin-bottom: 2px; }
    .booking-pill { font-size: 9px; padding: 2px 4px; margin-bottom: 2px; }
    .cal-header-cell { font-size: 9px; padding: 8px 0; letter-spacing: 0; }
    .legend-bar { gap: 6px; }
    .chip { padding: 5px 10px; font-size: 11px; }
  }
  .mobile-list { display: none; }
</style>
</head>

<script>
const typeLabel = { large: "大教室", small: "小教室", full: "全開空間" };
const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
// Notion API via multiple CORS proxies
async function fetchWithProxy(url, options) {
  const proxies = [
    // corsproxy.io - most reliable for GitHub Pages
    async () => {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, options);
      if (!r.ok) throw new Error(r.status);
      return r;
    },
    // thingproxy
    async () => {
      const r = await fetch(`https://thingproxy.freeboard.io/fetch/${url}`, options);
      if (!r.ok) throw new Error(r.status);
      return r;
    },
    // allorigins
    async () => {
      const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, options);
      if (!r.ok) throw new Error(r.status);
      return r;
    },
  ];
  let lastErr;
  for (const tryProxy of proxies) {
    try {
      const res = await tryProxy();
      return res;
    } catch(e) { lastErr = e; continue; }
  }
  throw lastErr || new Error("All proxies failed");
}

let currentDate = new Date();
let selectedDate = null;
let activeFilters = { large: true, small: true, full: true };
let allBookings = [];
let isLoading = false;

function setStatus(state, text) {
  document.getElementById('statusDot').className = `status-dot ${state}`;
  document.getElementById('statusText').textContent = text;
}

function toggleFilter(type, el) {
  activeFilters[type] = !activeFilters[type];
  el.classList.toggle('inactive');
  renderCalendar();
  if (selectedDate) selectDate(selectedDate);
}

function getBookingsForDate(ds) {
  return allBookings.filter(b => b.date === ds && activeFilters[b.type]);
}

function dStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function isToday(y, m, d) {
  const t = new Date();
  return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d;
}

function renderCalendar() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('calTitle').textContent = `${y} 年 ${monthNames[m]}`;
  // 當月時隱藏上一月按鈕
  const today = new Date();
  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) {
    const isCurrentMonth = y === today.getFullYear() && m === today.getMonth();
    prevBtn.style.opacity = isCurrentMonth ? '0.3' : '1';
    prevBtn.style.cursor = isCurrentMonth ? 'not-allowed' : 'pointer';
  }

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  document.querySelectorAll('.loading-overlay').forEach(el => el.remove());
  renderMobileList();
  if (isLoading) {
    const ov = document.createElement('div');
    ov.className = 'loading-overlay';
    ov.innerHTML = '<span>🔄 同步資料中…</span>';
    document.querySelector('.cal-wrap').appendChild(ov);
  }

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev  = new Date(y, m, 0).getDate();

  for (let i = firstDay-1; i >= 0; i--) makeCell(grid, dStr(y, m-1, daysInPrev-i), daysInPrev-i, true);
  for (let d = 1; d <= daysInMonth; d++) makeCell(grid, dStr(y, m, d), d, false);
  const total = firstDay + daysInMonth;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remain; d++) makeCell(grid, dStr(y, m+1, d), d, true);
}

function renderMobileList() {
  const list = document.getElementById('mobileList');
  if (!list) return;
  list.innerHTML = '';

  const today = new Date();
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthNames2 = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const dowNames = ["日","一","二","三","四","五","六"];

  // Month title
  const title = document.createElement('div');
  title.className = 'mobile-month-title';
  title.textContent = `${y} 年 ${monthNames2[m]}`;
  list.appendChild(title);

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = dStr(y, m, d);
    const dateObj = new Date(y, m, d);
    const dow = dateObj.getDay();
    // Skip past days in current month
    const thisDay = new Date(y, m, d);
    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (thisDay < todayStart) continue;

    const dayBookings = getBookingsForDate(ds);

    const dayEl = document.createElement('div');
    dayEl.className = 'mobile-day';

    const isToday_ = isToday(y, m, d);
    const dowColor = dow === 0 ? '#EF4444' : dow === 6 ? '#3B82F6' : 'var(--text)';

    dayEl.innerHTML = `
      <div class="mobile-day-header">
        <div class="mobile-day-num ${isToday_ ? 'today-num' : ''}" style="color:${dow===0?'#EF4444':dow===6?'#3B82F6':isToday_?'var(--solar-orange)':'var(--text)'}">
          ${d}
        </div>
        <div>
          <div class="mobile-day-dow" style="color:${dowColor}">週${dowNames[dow]}</div>
          <div class="mobile-day-info">${isToday_ ? '今天' : ''}</div>
        </div>
      </div>
    `;

    if (dayBookings.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'mobile-empty';
      empty.textContent = '空閒可租借';
      dayEl.appendChild(empty);
    } else {
      [...dayBookings].sort((a,b) => a.start.localeCompare(b.start)).forEach(b => {
        const pill = document.createElement('div');
        pill.className = `booking-pill pill-${b.type}`;
        pill.style.marginBottom = '4px';
        pill.textContent = `${b.start !== '—' ? b.start : ''} ${b.end !== '—' ? '– '+b.end : ''} ${typeLabel[b.type]}`;
        dayEl.appendChild(pill);
      });
    }

    dayEl.onclick = () => selectDate(ds);
    list.appendChild(dayEl);
  }
}

function makeCell(grid, ds, dayNum, otherMonth) {
  const parts = ds.split('-');
  const y = parseInt(parts[0]), m = parseInt(parts[1])-1;
  const dow = new Date(y, m, dayNum).getDay();

  const cell = document.createElement('div');
  cell.className = 'cal-cell' +
    (otherMonth ? ' other-month' : '') +
    (isToday(y, m, dayNum) ? ' today' : '') +
    (dow===0 ? ' sunday' : '') + (dow===6 ? ' saturday' : '') +
    (selectedDate===ds ? ' selected' : '');

  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  numEl.textContent = dayNum;
  cell.appendChild(numEl);

  const dayBookings = getBookingsForDate(ds);
  dayBookings.slice(0, 2).forEach(b => {
    const pill = document.createElement('div');
    pill.className = `booking-pill pill-${b.type}`;
    pill.textContent = `${b.start !== '—' ? b.start+' ' : ''}${typeLabel[b.type]}`;
    cell.appendChild(pill);
  });
  if (dayBookings.length > 2) {
    const more = document.createElement('div');
    more.className = 'booking-pill pill-hidden';
    more.textContent = `+${dayBookings.length-2} 筆`;
    cell.appendChild(more);
  }

  cell.onclick = () => selectDate(ds);
  grid.appendChild(cell);
}

function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();

  const parts = ds.split('-');
  const y = parseInt(parts[0]), m = parseInt(parts[1])-1, d = parseInt(parts[2]);
  const dow = ["日","一","二","三","四","五","六"][new Date(y,m,d).getDay()];
  document.getElementById('sideDateLabel').textContent = `${y}/${parts[1]}/${parts[2]} (週${dow})`;

  const body = document.getElementById('sideBody');
  const dayBookings = getBookingsForDate(ds);

  if (dayBookings.length === 0) {
    body.innerHTML = `<div class="side-empty"><div class="side-empty-icon">✅</div>此日尚無預約<br>歡迎洽詢租借</div>`;
    return;
  }

  body.innerHTML = '';
  [...dayBookings].sort((a,b) => a.start.localeCompare(b.start)).forEach(b => {
    const card = document.createElement('div');
    card.className = 'detail-card';
    card.innerHTML = `
      <div class="detail-tag ${b.type}">${typeLabel[b.type]}</div>
      <div class="detail-time">${b.start}${b.end !== '—' ? ' – '+b.end : ''}</div>
      <div class="detail-name">已被租借</div>
    `;
    body.appendChild(card);
  });
}

function jumpToDate() {
  const input = document.getElementById('dateSearchInput');
  const val = input.value;
  if (!val) return;

  const date = new Date(val + 'T00:00:00');
  if (isNaN(date)) return;

  // 不允許跳到過去月份
  const today = new Date();
  const thisMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const targetMonth = new Date(date.getFullYear(), date.getMonth(), 1);
  if (targetMonth < thisMonth) {
    // 顯示提示
    input.style.borderColor = '#EF4444';
    setTimeout(() => input.style.borderColor = '', 1500);
    return;
  }

  currentDate = new Date(date.getFullYear(), date.getMonth(), 1);
  renderCalendar();

  // 選中該日期
  const ds = dStr(date.getFullYear(), date.getMonth(), date.getDate());
  selectDate(ds);

  // 捲動到日曆頂部
  document.querySelector('.cal-nav').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function changeMonth(delta) {
  const next = new Date(currentDate);
  next.setMonth(next.getMonth() + delta);
  // 不允許切換到上個月之前
  const today = new Date();
  const thisMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  if (next < thisMonth) return;
  currentDate = next;
  renderCalendar();
}

function goToday() {
  currentDate = new Date();
  const t = new Date();
  renderCalendar();
  selectDate(dStr(t.getFullYear(), t.getMonth(), t.getDate()));
}

// Notion API
async function fetchNotionBookings() {
  if (!CONFIG.WORKER_URL) {
    setStatus('error', '未設定 Worker URL');
    loadFallbackData();
    return;
  }
  setStatus('loading', '同步中');
  isLoading = true;
  renderCalendar();

  try {
    // Fetch all pages with pagination
    let allResults = [];
    let hasMore = true;
    let cursor = null;
    while (hasMore) {
      const url = cursor ? `${CONFIG.WORKER_URL}?cursor=${encodeURIComponent(cursor)}` : CONFIG.WORKER_URL;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allResults = allResults.concat(data.results || []);
      hasMore = data.has_more || false;
      cursor = data.next_cursor || null;
    }
    allBookings = parseNotionResults(allResults);
    setStatus('ok', '已同步');
  } catch(e) {
    console.error(e);
    setStatus('error', '示範模式');
    loadFallbackData();
  }

  isLoading = false;
  renderCalendar();
  if (selectedDate) selectDate(selectedDate);
}

function parseNotionResults(results) {
  const bookings = [];
  const F = CONFIG.FIELDS;
  results.forEach(page => {
    const props = page.properties;
    try {
      const dateProp = props[F.date];
      if (!dateProp) return;
      let dateStr = null, startTime = null, endTime = null;
      if (dateProp.type === 'date' && dateProp.date) {
        const d = dateProp.date;
        if (d.start) {
          dateStr = d.start.substring(0, 10);
          // Handle datetime with timezone: 2025-04-08T19:30:00.000+08:00
          if (d.start.length > 10) {
            const t = new Date(d.start);
            // Convert to local time (UTC+8)
            const local = new Date(t.getTime() + 8 * 60 * 60 * 1000);
            dateStr = local.toISOString().substring(0, 10);
            startTime = local.toISOString().substring(11, 16);
          }
        }
        if (d.end && d.end.length > 10) {
          const t = new Date(d.end);
          const local = new Date(t.getTime() + 8 * 60 * 60 * 1000);
          endTime = local.toISOString().substring(11, 16);
        }
      }
      if (!dateStr) return;
      if (!startTime && props[F.startTime]) {
        const sv = props[F.startTime];
        if (sv.type === 'rich_text') startTime = sv.rich_text[0]?.plain_text || null;
        if (sv.type === 'date' && sv.date?.start) startTime = sv.date.start.substring(11, 16);
      }
      if (!endTime && props[F.endTime]) {
        const ev = props[F.endTime];
        if (ev.type === 'rich_text') endTime = ev.rich_text[0]?.plain_text || null;
        if (ev.type === 'date' && ev.date?.start) endTime = ev.date.start.substring(11, 16);
      }
      const spaceProp = props[F.spaceType];
      let spaceRaw = null;
      if (spaceProp?.type === 'select') spaceRaw = spaceProp.select?.name;
      if (spaceProp?.type === 'multi_select') spaceRaw = spaceProp.multi_select?.[0]?.name;
      if (spaceProp?.type === 'rich_text') spaceRaw = spaceProp.rich_text?.[0]?.plain_text;
      const type = CONFIG.SPACE_MAP[spaceRaw] || 'large';

      // 檢查狀態欄位
      const statusProp = props['狀態'];
      let displayLabel = '已被租借';
      if (statusProp) {
        // 列出所有可能的狀態欄位型別
        let statusVal = null;
        if (statusProp.type === 'status') statusVal = statusProp.status?.name;
        if (statusProp.type === 'select') statusVal = statusProp.select?.name;
        if (statusProp.type === 'rich_text') statusVal = statusProp.rich_text?.[0]?.plain_text;
        if (statusProp.type === 'formula') statusVal = statusProp.formula?.string;
        console.log('statusProp type:', statusProp.type, '| statusVal:', statusVal);
        if (statusVal) {
          // 取消/退費狀態 → 不顯示
          const isCancelled = CONFIG.CANCELLED_STATUSES.some(s => statusVal.includes(s));
          if (isCancelled) return;
          // 預約卡位 → 顯示特別標籤
          if (statusVal.includes('預約卡位')) displayLabel = '有人卡位 尚可詢問';
        }
      } else {
        console.log('狀態 prop not found, available props:', Object.keys(props));
      }

      // 若有特別標籤（如卡位）則優先使用，不被承租人名稱覆蓋
      const name = displayLabel;
      bookings.push({ date: dateStr, type, start: startTime || '—', end: endTime || '—', name });
    } catch(e) { console.warn(e); }
  });
  return bookings;
}

function loadFallbackData() {
  const t = new Date();
  const y = t.getFullYear(), m = String(t.getMonth()+1).padStart(2,'0');
  const d = (n) => `${y}-${m}-${String(n).padStart(2,'0')}`;
  allBookings = [
    { date: d(3),  type: "large", start: "09:00", end: "12:00", name: "企業培訓" },
    { date: d(3),  type: "small", start: "14:00", end: "17:00", name: "讀書會" },
    { date: d(5),  type: "full",  start: "10:00", end: "18:00", name: "股東大會" },
    { date: d(8),  type: "large", start: "13:00", end: "16:00", name: "產品發表" },
    { date: d(10), type: "small", start: "09:00", end: "11:00", name: "工作坊" },
    { date: d(12), type: "full",  start: "09:00", end: "21:00", name: "婚禮宴會" },
    { date: d(15), type: "large", start: "10:00", end: "13:00", name: "瑜珈課程" },
    { date: d(18), type: "small", start: "15:00", end: "18:00", name: "桌遊聚會" },
    { date: d(20), type: "full",  start: "08:00", end: "20:00", name: "藝術展覽" },
    { date: d(22), type: "large", start: "14:00", end: "17:00", name: "演講練習" },
  ];
}

async function init() {
  renderCalendar();
  const t = new Date();
  selectDate(dStr(t.getFullYear(), t.getMonth(), t.getDate()));
  // 設定日期輸入框預設為今天
  const y = t.getFullYear();
  const m = String(t.getMonth()+1).padStart(2,'0');
  const d = String(t.getDate()).padStart(2,'0');
  const inputEl = document.getElementById('dateSearchInput');
  if (inputEl) {
    inputEl.value = `${y}-${m}-${d}`;
    inputEl.min = `${y}-${m}-01`;
  }
  await fetchNotionBookings();
  setInterval(fetchNotionBookings, 5 * 60 * 1000);
}

init();
